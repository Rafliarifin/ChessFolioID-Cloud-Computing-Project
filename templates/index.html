<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chessfolio - SaaS Catur</title>
    <!-- Tailwind CSS (via CDN sementara untuk kerangka) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Menyesuaikan tema warna hijau seperti permintaan -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                light: '#e8f5e9',
                DEFAULT: '#4caf50',
                dark: '#2e7d32',
              }
            }
          }
        }
      }
    </script>
</head>
<body class="bg-gray-50 text-gray-800">
    <div class="min-h-screen flex flex-col justify-center items-center">
        <h1 class="text-4xl font-bold text-brand-dark mb-4">Selamat Datang di Chessfolio!</h1>
        <p class="text-lg mb-8">Platform SaaS untuk Profil Catur Anda (Berjalan di atas Python Flask)</p>
        <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-brand">
            <h2 class="text-xl font-semibold mb-2">Status Environment:</h2>
            <p><strong>App URL:</strong> {{ app_url }}</p>
        </div>
    </div>
</body>
</html>
